- alias: Lights at sunset
  trigger:
  - event: sunset
    offset: -01:00:00
    platform: sun
  condition: []
  action:
  - data:
      brightness_pct: '30'
      entity_id:
      - light.hallway_light
      - light.living_room_window
      - light.switch_light
    service: light.turn_on
- alias: Auto turn off lights
  trigger:
  - at: '23:00'
    platform: time
  - event: sunrise
    offset: 01:00:00
    platform: sun
  condition: []
  action:
  - alias: ''
    data:
      entity_id:
      - light.living_room_window
      - light.hallway_light
      - light.bedroom_window_1
      - light.bedroom_window_2
    service: light.turn_off
  - data:
      entity_id: light.switch_light
    service: light.turn_off
- alias: 'Lights in the morning'
  trigger:
  - at: 06:00
    platform: time
  condition:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  action:
  - data:
      brightness_pct: '30'
      entity_id: light.hallway_light
      transition: '20'
    service: light.turn_on
  - data:
      brightness_pct: '30'
      entity_id: light.living_room_window
      transition: '20'
    service: light.turn_on
- alias: Trigger radio
  trigger:
    platform: template
    value_template: "{{ strptime(states('sensor.phone_alarm_time'), '%Y-%m-%d %H:%M') == strptime(states('sensor.date_time'), '%Y-%m-%d, %H:%M') }}"
  condition: []
  action:
  - data: {}
    service: script.1545863420408
- alias: 'Wakeup lights'
  trigger:
    platform: template
    value_template: "{{ ((as_timestamp(strptime(states('sensor.phone_alarm_time'), '%Y-%m-%d %H:%M')) - 20*60) | timestamp_custom('%Y-%m-%d, %H:%M')) == strptime(states('sensor.date_time'), '%Y-%m-%d %H:%M') }}"
  action:
  - data:
      brightness_pct: '99'
      entity_id: light.wakeup
      transition: '1200'
    service: light.turn_on
