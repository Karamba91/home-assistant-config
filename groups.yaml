default_view:
        name: Home
        view: yes
        entities:
                - group.alarm_display
                - group.climate_sensor
                - group.living_room_lights
                - media_player.spotify
                - sun.sun
                - weather.smhi_home
                - sensor.bergsprangaregatan

climate_sensors:
        name: Climate sensor
        control: hidden
        entities:
                - sensor.bmp085_sensor_temperature
                - sensor.bmp085_sensor_pressure
alarm_display:
        name: Alarm display
        control: hidden
        entities:
                - sensor.alarm_time
               
alarm_sensors:
        name: Alarm sensor
        view: false
        control: hidden
        entities:
                - sensor.phone_alarm_day
                - sensor.phone_alarm_time
google_home:
        name: Google home
        view: true
        entities:
                - media_player.chromecast_living_room
                - media_player.chromecast_bedroom
                - media_player.bedroom_speaker
                - media_player.living_room_speaker
                - media_player.eriks_group
living_room_lights:
        name: Living room
        entities:
                - light.living_room_window
                - light.hallway_light
                - switch.switch_light
